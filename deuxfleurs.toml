[[cors]]
allowed_origins = "*"
allowed_methods = ["GET", "POST"]
allowed_headers = "*"

[[headers]]
for = ["**/*.woff2", "**/*.woff", "**/*.svg", "**/*.ttf", "**/*.otf", "**/*.eot", "**/*.js", "**/*.css"]
compress = "gzip"
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[headers]]
for = ["**/*.png", "**/*.jpg", "**/*.jpeg", "**/*.gif", "**/*.webp"]
[headers.values]
Cache-Control = "max-age=31536000, no-transform, public"

[[redirects]]
from = "/equipe/camille-fourcade/offres/"
to = "/equipe/camille-fourcade/nos-propositions/"

[[redirects]]
from = "/nos-propositions/"
to = "/articles/"

[[redirects]]
from = "/actualites/"
to = "/articles/"

[[redirects]]
from = "/offres/"
to = "/articles/"

[[redirects]]
from = "/equipe/camille-fourcade/actualites/"
to = "/equipe/camille-fourcade/nos-propositions/"

